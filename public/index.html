<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<title>Doctor Optic — 17.05.2026</title>
<style>
  :root{
    --bg:#0b1220; --bg2:#111a2e; --card:#16213a; --card2:#1c2a48; --line:#22304d;
    --text:#e6edf7; --muted:#9aa7bd; --accent:#60a5fa;
    --green:#22c55e; --green-bg:rgba(34,197,94,.12);
    --amber:#eab308; --amber-bg:rgba(234,179,8,.14);
    --red:#ef4444; --red-bg:rgba(239,68,68,.14);
    --purple:#a78bfa;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Inter,Arial,sans-serif;
    font-size:15px;line-height:1.35;
    padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
  .wrap{max-width:440px;margin:0 auto;padding:14px 14px 80px;display:none}
  .wrap.authenticated{display:block}
  .hdr{display:flex;align-items:center;gap:10px;padding:6px 4px 14px}
  .hdr .logo{width:34px;height:34px;border-radius:10px;
    background:linear-gradient(135deg,#3b82f6,#a78bfa);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff}
  .hdr .title{font-weight:700;font-size:16px;letter-spacing:.2px}
  .hdr .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .hdr .right{margin-left:auto;text-align:right}
  .stoplight{display:inline-flex;align-items:center;gap:6px;font-size:12px;
    padding:5px 9px;border-radius:999px;background:var(--amber-bg);color:var(--amber);font-weight:600}
  .stoplight .dot{width:8px;height:8px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
  .card h2{margin:0 0 10px;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;
    color:var(--muted);font-weight:600;display:flex;align-items:center;gap:8px}
  .card h2 .badge{font-size:10px;padding:2px 7px;border-radius:999px;letter-spacing:.5px;text-transform:none}
  .badge.red{background:var(--red-bg);color:var(--red)}
  .badge.amber{background:var(--amber-bg);color:var(--amber)}
  .badge.green{background:var(--green-bg);color:var(--green)}
  .big{font-size:30px;font-weight:700;letter-spacing:-.5px;line-height:1.05}
  .big .cur{font-size:18px;color:var(--muted);margin-left:4px;font-weight:500}
  .sub-line{color:var(--muted);font-size:12px;margin-top:2px}
  .row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;
    border-top:1px dashed var(--line)}
  .row:first-of-type{border-top:0}
  .row .lbl{color:var(--muted);font-size:13px}
  .row .val{font-variant-numeric:tabular-nums;font-weight:600;font-size:14px}
  .row .lbl small{display:block;color:var(--muted);font-size:11px;margin-top:1px;opacity:.7}
  .delta-bad{color:var(--red);font-size:11px;font-weight:600}
  .delta-good{color:var(--green);font-size:11px;font-weight:600}
  .od-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
  .od-cell{background:var(--card2);border-radius:10px;padding:10px}
  .od-cell .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  .od-cell .v{font-size:18px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}
  .bar{height:8px;background:var(--bg2);border-radius:99px;overflow:hidden;margin-top:10px}
  .bar > i{display:block;height:100%;border-radius:99px;
    background:linear-gradient(90deg,#22c55e,#eab308 60%,#ef4444 90%)}
  .bar-cap{display:flex;justify-content:space-between;color:var(--muted);font-size:11px;margin-top:6px}
  .loan{display:grid;grid-template-columns:1fr auto;gap:2px 10px;padding:10px 0;border-top:1px solid var(--line)}
  .loan:first-of-type{border-top:0}
  .loan .name{font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .loan .name .pill{font-size:10px;padding:2px 6px;border-radius:999px;
    background:var(--bg2);color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .loan .pay{font-variant-numeric:tabular-nums;font-weight:700;text-align:right}
  .loan .ost{color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums}
  .loan .dt{color:var(--muted);font-size:12px;text-align:right;font-variant-numeric:tabular-nums}
  .loan .end{color:var(--purple);font-size:11px;font-weight:600;margin-left:6px}
  .loan.priority{background:var(--red-bg);margin:6px -14px;padding:10px 14px;
    border-radius:10px;border-top:0;box-shadow:inset 3px 0 0 var(--red)}
  .loan.priority .name{color:var(--red)}
  .loan.warning{background:var(--amber-bg);margin:6px -14px;padding:10px 14px;
    border-radius:10px;border-top:0;box-shadow:inset 3px 0 0 var(--amber)}
  .loan.warning .name{color:var(--amber)}
  .loan.paid{background:var(--green-bg);margin:6px -14px;padding:10px 14px;
    border-radius:10px;border-top:0;box-shadow:inset 3px 0 0 var(--green)}
  .loan.paid .name{color:var(--green)}
  .loan.paid .pay{color:var(--green)}
  .loan.frozen{opacity:.55}
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
  .kpi{background:var(--card2);border-radius:12px;padding:12px}
  .kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  .kpi .v{font-size:20px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}
  .kpi .d{font-size:11px;margin-top:2px;font-variant-numeric:tabular-nums}
  .sales-list .item{display:flex;justify-content:space-between;align-items:center;
    padding:8px 0;border-top:1px dashed var(--line)}
  .sales-list .item:first-child{border-top:0}
  .sales-list .lbl{display:flex;align-items:center;gap:8px}
  .sales-list .ic{width:26px;height:26px;border-radius:8px;background:var(--card2);
    display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--accent)}
  .sales-list .qty{color:var(--muted);font-size:12px;margin-left:6px}
  .sales-list .v{font-variant-numeric:tabular-nums;font-weight:600;font-size:14px}
  .sec-title{display:flex;justify-content:space-between;align-items:center;margin:4px 0 8px}
  .sec-title h3{margin:0;font-size:13px;font-weight:600;color:var(--text)}
  .sec-title small{color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums}
  .footer{color:var(--muted);font-size:11px;text-align:center;padding:14px 4px 0}
  .nav{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;
    background:rgba(22,33,58,.85);backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:999px;padding:6px;display:flex;gap:4px;
    box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:50}
  .nav button{background:transparent;color:var(--muted);border:0;padding:8px 14px;
    border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.3px}
  .nav button.on{background:var(--accent);color:#0b1220}
  .pane{display:none} .pane.on{display:block}
  .margin-split{background:var(--card2);border-radius:12px;padding:12px;margin-top:8px}
  .margin-split .title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
  .margin-split .row-split{display:grid;grid-template-columns:90px 1fr auto;gap:10px;align-items:baseline;padding:6px 0;border-top:1px dashed var(--line)}
  .margin-split .row-split:first-of-type{border-top:0}
  .margin-split .name{font-weight:600;font-size:13px}
  .margin-split .bar-mini{height:6px;background:var(--bg);border-radius:99px;overflow:hidden;position:relative}
  .margin-split .bar-mini > i{display:block;height:100%;border-radius:99px}
  .margin-split .v{font-variant-numeric:tabular-nums;font-weight:700;font-size:13px;text-align:right;white-space:nowrap}
  .glasses-note{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);
    border-radius:10px;padding:10px;margin-bottom:10px;font-size:12px;color:var(--text)}
  .glasses-note b{color:var(--accent)}
  .glasses-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
  .glasses-grid .cell{background:var(--card2);border-radius:10px;padding:10px;text-align:center}
  .glasses-grid .cell .v{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
  .glasses-grid .cell .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
  .arch-day{background:var(--card2);border-radius:12px;padding:12px;margin-top:6px}
  .arch-day .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .arch-day .head .d{font-size:13px;color:var(--muted);font-weight:600}
  .arch-day .head .b{font-size:18px;font-weight:700;color:var(--green);font-variant-numeric:tabular-nums}
  .arch-day .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;font-size:11px}
  .arch-day .grid .it{text-align:center;padding:6px 4px;background:var(--bg);border-radius:8px}
  .arch-day .grid .it .v{font-size:14px;font-weight:700;display:block;font-variant-numeric:tabular-nums}
  .arch-day .grid .it .l{color:var(--muted);font-size:10px;margin-top:2px}
  .chart-wrap{margin-top:8px}
  .chart-legend{display:flex;gap:14px;font-size:11px;color:var(--muted);margin-bottom:8px}
  .chart-legend .dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;vertical-align:middle}
  .chart-totals{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
  .chart-totals .cell{background:var(--card2);border-radius:10px;padding:10px}
  .chart-totals .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  .chart-totals .v{font-size:16px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}
  .chart-totals .v .cur{font-size:12px;color:var(--muted)}
  .pending-item{display:flex;justify-content:space-between;align-items:flex-start;
    padding:10px 0;border-top:1px dashed var(--line);gap:10px}
  .pending-item:first-of-type{border-top:0}
  .pending-item .pl{font-size:13px;color:var(--text);flex:1}
  .pending-item .pl small{display:block;color:var(--muted);font-size:11px;margin-top:2px}
  .pending-item .pv{font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;text-align:right;white-space:nowrap}
  .pending-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
  .pending-section .sec-h{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;
    margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline}
  .pending-section .sec-h .sum{color:var(--amber);font-weight:700;font-variant-numeric:tabular-nums;text-transform:none;font-size:13px}

  /* PIN Login */
  .login-screen{position:fixed;top:0;left:0;width:100%;height:100%;
    background:var(--bg);display:flex;align-items:center;justify-content:center;
    z-index:9999;opacity:1;visibility:visible;transition:opacity 0.3s,visibility 0.3s}
  .login-screen.hidden{opacity:0;visibility:hidden}
  .login-modal{background:var(--card);border:1px solid var(--line);
    border-radius:24px;padding:40px 24px;width:100%;max-width:340px;text-align:center}
  .login-modal h1{margin:0 0 4px;font-size:32px;color:var(--text);font-weight:700;
    background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;
    -webkit-text-fill-color:transparent;background-clip:text}
  .login-modal .subtitle{color:var(--muted);font-size:14px;margin-bottom:28px;font-weight:500}
  .pin-display{width:100%;padding:16px;background:var(--bg2);border:1px solid var(--line);
    border-radius:14px;margin-bottom:24px;font-size:28px;letter-spacing:8px;
    color:var(--text);font-weight:700;font-variant-numeric:tabular-nums;min-height:54px;
    display:flex;align-items:center;justify-content:center}
  .pin-display.error{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.25);color:var(--red)}
  .pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
  .pin-key{padding:14px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;
    color:var(--text);font-size:18px;font-weight:600;cursor:pointer;
    transition:all 0.15s;user-select:none}
  .pin-key:hover{background:var(--accent);color:#0b1220;transform:scale(1.05)}
  .pin-key:active{transform:scale(0.95)}
  .pin-actions{display:grid;grid-template-columns:1fr 2fr;gap:8px}
  .pin-del{padding:14px;background:var(--red-bg);border:1px solid rgba(239,68,68,.3);
    border-radius:12px;color:var(--red);font-weight:600;cursor:pointer;
    transition:all 0.15s}
  .pin-del:hover{background:var(--red);color:#fff}
  .pin-del:active{transform:scale(0.95)}
  .pin-ok{padding:14px;background:var(--green-bg);border:1px solid rgba(34,197,94,.3);
    border-radius:12px;color:var(--green);font-weight:600;cursor:pointer;
    transition:all 0.15s}
  .pin-ok:hover{background:var(--green);color:#0b1220}
  .pin-ok:active{transform:scale(0.95)}
  .login-error{color:var(--red);font-size:12px;margin-top:12px;min-height:16px}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-modal">
    <h1>Doctor Optic</h1>
    <div class="subtitle"></div>
    <div class="pin-display" id="pinDisplay">••••</div>
    <div class="pin-keypad">
      <div class="pin-key" onclick="addPin('1')">1</div>
      <div class="pin-key" onclick="addPin('2')">2</div>
      <div class="pin-key" onclick="addPin('3')">3</div>
      <div class="pin-key" onclick="addPin('4')">4</div>
      <div class="pin-key" onclick="addPin('5')">5</div>
      <div class="pin-key" onclick="addPin('6')">6</div>
      <div class="pin-key" onclick="addPin('7')">7</div>
      <div class="pin-key" onclick="addPin('8')">8</div>
      <div class="pin-key" onclick="addPin('9')">9</div>
    </div>
    <div class="pin-actions">
      <div class="pin-del" onclick="delPin()">Очистить</div>
      <div class="pin-key" onclick="addPin('0')" style="grid-column:span 2">0</div>
    </div>
    <button onclick="checkPin()" style="width:100%;padding:12px;margin-top:16px;border:0;
      border-radius:10px;background:var(--accent);color:#0b1220;font-weight:700;
      font-size:14px;cursor:pointer;transition:opacity 0.2s">Войти</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>
